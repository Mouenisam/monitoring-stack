services:
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v3.1.0}
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=native-histograms"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.4.0}
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
    depends_on:
      - prometheus
    restart: unless-stopped

  k6:
    image: grafana/k6:${K6_VERSION:-0.55.0}
    container_name: k6
    profiles: ["tools"]
    volumes:
      - ./scripts:/scripts
    environment:
      - K6_PROMETHEUS_RW_SERVER_URL=http://prometheus:9090/api/v1/write
      - K6_PROMETHEUS_RW_TREND_STATS=p(95),p(99),min,max,avg
      - K6_OUT=experimental-prometheus-rw
      - BASE_URL=${BASE_URL:-https://petstore.octoperf.com}
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
